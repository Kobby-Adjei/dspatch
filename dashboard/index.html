<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Dspatch gives small businesses and startups a full AI-powered support system: calls answered, tickets routed, customers never lost."
  />
  <title>Dspatch - Enterprise Customer Support for Small Teams</title>
  <link rel="preconnect" href="https://my.spline.design" />
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --ink: #FFFFFF;
      --paper: #0D0D0D;
      --surface: #141414;
      --muted: #888888;
      --border: #262626;
      --signal: #FF4D00;
      --night: #0D0D0D;
      --white: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #root {
      min-height: 100vh;
    }

    .site-shell {
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HERO */

    .hero-section {
      position: relative;
      min-height: 100vh;
      background: var(--night);
      color: var(--white);
      overflow: hidden;
    }

    .spline-background {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      border: 0;
      pointer-events: none;
    }

    .hero-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 62%;
      z-index: 1;
      background: linear-gradient(
        to top,
        rgba(13, 13, 13, 0.97) 0%,
        rgba(13, 13, 13, 0.82) 38%,
        transparent 100%
      );
      pointer-events: none;
    }

    /* TOPBAR */

    .topbar {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 0 clamp(16px, 4vw, 52px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      background: var(--signal);
      color: var(--white);
      font-size: 15px;
      font-weight: 800;
      border-radius: 4px;
    }

    .nav-links {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links a {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 600;
    }

    /* HERO CONTENT — horizontal strip pinned to bottom */

    .hero-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 0 clamp(16px, 4vw, 52px) 52px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(28px, 4vw, 64px);
      align-items: end;
    }

    .hero-copy-left {}

    .hero-copy-right {}

    .eyebrow {
      margin: 0 0 12px;
      color: var(--signal);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .eyebrow.dark {
      color: var(--signal);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 0;
      font-size: clamp(36px, 4.2vw, 68px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    h2 {
      max-width: 760px;
      margin-bottom: 0;
      font-size: clamp(30px, 4vw, 54px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    h3 {
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .hero-lede {
      max-width: 520px;
      margin-bottom: 24px;
      color: rgba(255, 255, 255, 0.65);
      font-size: clamp(15px, 1.4vw, 18px);
      line-height: 1.6;
    }

    /* CTAs */

    .cta-stack {
      display: grid;
      gap: 12px;
    }

    .cta-stack.compact {
      max-width: 560px;
      margin: 0 auto;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .primary-action,
    .secondary-action,
    .waitlist-row button {
      min-height: 46px;
      border: 0;
      border-radius: 4px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-action {
      background: var(--signal);
      color: var(--white);
    }

    .secondary-action {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: var(--white);
    }

    .dark-button {
      margin-top: 24px;
      background: var(--signal);
      color: var(--white);
      border: 0;
    }

    .small-proof {
      margin: 12px 0 0;
      color: rgba(255, 255, 255, 0.38);
      font-size: 12px;
      font-weight: 600;
    }

    /* WAITLIST FORM */

    .waitlist-form {
      width: min(520px, 100%);
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
    }

    .form-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .form-topline label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .form-topline button {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .waitlist-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .waitlist-row input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--paper);
      color: var(--white);
      padding: 0 12px;
      outline: none;
    }

    .waitlist-row input::placeholder {
      color: rgba(255, 255, 255, 0.28);
    }

    .waitlist-row button {
      background: var(--signal);
      color: var(--white);
      min-height: 44px;
    }

    .form-note {
      margin: 8px 0 0;
      color: var(--signal);
      font-size: 13px;
      font-weight: 700;
    }

    /* SECTIONS */

    .flat-section {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: clamp(56px, 8vw, 96px) 0;
    }

    .section-heading {
      margin-bottom: 32px;
    }

    .section-heading p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .three-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .flat-card {
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
    }

    .flat-card p,
    .step-card p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .solution-section,
    .grad-section,
    .proof-section {
      border-top: 1px solid var(--border);
    }

    .step-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .step-card {
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
    }

    .step-card span {
      display: inline-flex;
      margin-bottom: 24px;
      color: var(--signal);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .pricing-callout {
      margin-top: 16px;
      padding: 20px 24px;
      border-radius: 4px;
      background: var(--signal);
      color: var(--white);
      font-size: clamp(17px, 2.2vw, 26px);
      font-weight: 800;
      line-height: 1.1;
    }

    .grad-section .section-heading {
      max-width: 820px;
    }

    .proof-section .centered {
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      min-height: 180px;
      display: grid;
      align-content: center;
      gap: 10px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      text-align: center;
    }

    .stat-card strong {
      color: var(--signal);
      font-size: clamp(40px, 6vw, 68px);
      line-height: 0.9;
      font-weight: 800;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    /* FINAL CTA */

    .final-cta {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto clamp(28px, 5vw, 48px);
      padding: clamp(40px, 7vw, 64px);
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--white);
      text-align: center;
    }

    .final-cta h2 {
      margin-left: auto;
      margin-right: auto;
    }

    .final-cta > div > p {
      margin: 14px auto 24px;
      color: var(--muted);
      font-size: 17px;
    }

    .final-cta .cta-row {
      justify-content: center;
    }

    .final-cta .waitlist-form {
      margin-top: 12px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* FOOTER */

    .footer {
      display: grid;
      gap: 8px;
      padding: 28px 16px 36px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .footer p {
      margin: 0;
    }

    .footer nav {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer a {
      color: var(--white);
      font-weight: 700;
    }

    /* ── ANIMATIONS ── */

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0);     }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Typewriter cursor */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.82em;
      background: var(--signal);
      margin-left: 4px;
      vertical-align: middle;
      border-radius: 1px;
      animation: blink 0.75s step-end infinite;
    }

    /* Hero eyebrow fades in immediately */
    .anim-fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    /* Hero right side — slides up after typewriter done */
    .hero-copy-right {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .hero-copy-right.ready {
      opacity: 1;
      transform: translateY(0);
    }

    /* Scroll-reveal base — hidden until .visible added */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
    }

    .reveal.fade-left {
      transform: translateX(-20px);
    }

    .reveal.visible {
      animation: fadeUp 0.55s ease forwards;
    }

    .reveal.fade-left.visible {
      animation: fadeLeft 0.55s ease forwards;
    }

    /* Stagger delays */
    .reveal.d1 { animation-delay: 0.05s; }
    .reveal.d2 { animation-delay: 0.15s; }
    .reveal.d3 { animation-delay: 0.25s; }

    @media (max-width: 860px) {
      .three-grid,
      .step-grid,
      .stat-grid {
        grid-template-columns: 1fr;
      }

      .hero-content {
        grid-template-columns: 1fr;
        padding-bottom: 36px;
      }
    }

    @media (max-width: 560px) {
      .hero-content {
        padding: 0 14px 32px;
      }

      .nav-links {
        display: none;
      }

      h1 {
        font-size: 38px;
      }

      .primary-action,
      .secondary-action {
        width: 100%;
      }

      .waitlist-row {
        grid-template-columns: 1fr;
      }

      .waitlist-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
