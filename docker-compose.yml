version: '3.9'

services:
  # PostgreSQL with pgvector (local dev only — replaced by Cloudant in production)
  db:
    image: pgvector/pgvector:pg16
    container_name: dspatch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dspatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dspatch}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dspatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask webhook server (/sms + /voice)
  flask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dspatch_flask
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://dspatch:password@db:5432/dspatch
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: python agent/twilio_handler.py

  # WebSocket server (Twilio MediaStream voice bridge)
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dspatch_websocket
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://dspatch:password@db:5432/dspatch
    ports:
      - "8765:8765"
    depends_on:
      db:
        condition: service_healthy
    command: python agent/main.py

  # Owner dashboard (static files via nginx)
  dashboard:
    image: nginx:alpine
    container_name: dspatch_dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: dspatch_network
